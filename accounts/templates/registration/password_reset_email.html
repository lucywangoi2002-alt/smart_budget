<!DOCTYPE html>
<html>
<body style="font-family: Arial; background:#f4f6f9; padding:20px;">

<div style="max-width:500px; margin:auto; background:white; padding:25px; border-radius:10px;">

    <h2 style="color:#333;">🔐 Password Reset</h2>

    <p>Hello <strong>{{ user.username }}</strong>,</p>

    <p>You requested to reset your password for your SmartBudget account.</p>

    <p style="text-align:center; margin:20px 0;">
        <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
           style="background:#0d6efd; color:white; padding:12px 20px; text-decoration:none; border-radius:5px; display:inline-block;">
            Reset Password
        </a>
    </p>

    <p>If you didn’t request this, you can safely ignore this email.</p>

    <hr>
    <small style="color:gray;">SmartBudget • Secure Finance Tracking</small>

</div>

</body>
</html>
