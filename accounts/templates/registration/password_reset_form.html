{% extends "base.html" %}

{% block content %}
<div class="container mt-5 col-md-5">

    <div class="card p-4 shadow-sm">

        <h3 class="text-center mb-3">Reset Password</h3>

        <form method="post">
            {% csrf_token %}
            {{ form }}

            <button class="btn btn-primary w-100 mt-3">
                Send Reset Link
            </button>
        </form>

    </div>

</div>
{% endblock %}
